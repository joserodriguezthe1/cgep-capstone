name: grc-gate

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: lab-2-3-first-compliant-resource/terraform/primitives/compliant-s3
  TF_VAR_environment: dev
  TF_VAR_project_name: compliant-s3-demo

jobs:
  grc-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin conftest

      - name: Install tfsec
        run: |
          curl -fsSL https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 \
            -o /usr/local/bin/tfsec && chmod +x /usr/local/bin/tfsec

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          terraform validate
          terraform plan -out=tfplan -no-color | tee plan.txt
          terraform show -json tfplan > plan.json

      - name: Conftest policy gate
        id: conftest
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/evidence
          {
            echo "["
            FIRST=1
            for ns in compliance.sc28_aws compliance.ac3_aws compliance.cm6_aws compliance.cm6 ; do
              [[ $FIRST -eq 1 ]] && FIRST=0 || printf ","
              conftest test --policy $GITHUB_WORKSPACE/policies --namespace "$ns" --output=json plan.json || true
            done
            echo "]"
          } > $GITHUB_WORKSPACE/evidence/conftest-results.json
          python3 -c '
          import json, sys, os
          path = os.path.join(os.environ["GITHUB_WORKSPACE"], "evidence", "conftest-results.json")
          d = json.load(open(path))
          fails = sum(len(r.get("failures") or []) for results in d for r in results)
          print(f"conftest failures: {fails}")
          sys.exit(0 if fails == 0 else 1)
          '

      - name: tfsec scan
        id: tfsec
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/evidence
          tfsec . --format sarif --out $GITHUB_WORKSPACE/evidence/tfsec.sarif --config-file $GITHUB_WORKSPACE/.tfsec/config.yml || true
          cat $GITHUB_WORKSPACE/evidence/tfsec.sarif
          python3 -c '
          import json, sys, os
          path = os.path.join(os.environ["GITHUB_WORKSPACE"], "evidence", "tfsec.sarif")
          d = json.load(open(path))
          high = sum(
              1 for run in d.get("runs", [])
              for r in run.get("results", [])
              if (r.get("level") or "").lower() in ("error","critical","high")
          )
          print(f"tfsec high+critical: {high}")
          sys.exit(0 if high == 0 else 1)
          '

      - name: Copy plan into evidence
        if: always()
        run: |
          cp ${{ env.TF_WORKING_DIR }}/plan.json $GITHUB_WORKSPACE/evidence/plan.json
          cp ${{ env.TF_WORKING_DIR }}/plan.txt $GITHUB_WORKSPACE/evidence/plan.txt

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: evidence/
          retention-days: 90